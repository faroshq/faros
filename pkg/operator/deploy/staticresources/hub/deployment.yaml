apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: faros-hub
  name: faros-hub
  namespace: faros-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: faros-hub
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: faros-hub
    spec:
      containers:
      - command:
        - faros
        args:
        - hub
        image: GENERATED
        name: faros-hub
        ports:
        - containerPort: 8080
          name: http
      serviceAccountName: faros-hub
      priorityClassName: system-cluster-critical
