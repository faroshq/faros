fullnameOverride: faros
service:
  type: ClusterIP
  port: 8443
  name: faros
nodeService:
  enabled: true
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
